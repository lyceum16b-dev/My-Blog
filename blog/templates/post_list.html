{% extends 'base.html' %}

{% block content %}
    {% for post in posts %}
        <div class="post">
            <div class="date">
                {{ post.published_date }}
            </div>
            <h1><a href="/post/{{ post.id }}/">{{ post.title }}</a></h1>
            <p>{{ post.text|safe }}</p>
        </div>
    {% endfor %}
{% endblock %}
