{% extends 'base.html' %}

{% block content %}
    <div class="post">
        {% if post.published_date %}
            <div class="date">
                {{ post.published_date }}
            </div>
        {% endif %}
                {% if user.is_authenticated %}

        <a class="btn btn-default" href="/post/edit/{{ post.id }}">Редагувати</a>
        {% endif %}
        <h1>{{ post.title }}</h1>
        <p>{{ post.text|safe }}</p>
    </div>
{% endblock %}
