<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p>{{ post.content }}</p>
    <p>Author: {{ post.author }}</p>
    <p>Published on: {{ post.published_date|date:"F j, Y" }}</p>
    <a href="{% url 'post_list' %}">Back to all posts</a>
</body>
</html>
